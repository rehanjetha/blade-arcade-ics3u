<svg width="1100" height="500" viewBox="0 0 1100 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Blade Arcade system map</title>
  <desc id="desc">A diagram showing the flow from the main Python file to login, home, games, coin storage, saves, and optional ROM files.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="#38BDF8"/>
    </marker>
  </defs>
  <rect width="1100" height="500" rx="24" fill="#0F172A"/>
  <text x="54" y="72" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">How Blade Arcade fits together</text>
  <text x="54" y="108" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">A small Tkinter shell that connects local accounts, coin updates, mini-games, and optional emulator sessions.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="70" y="184" width="172" height="82" rx="16" fill="#182235" stroke="#38BDF8"/>
    <text x="96" y="218" fill="#F8FAFC" font-size="19" font-weight="700">Main file</text>
    <text x="96" y="246" fill="#CBD5E1" font-size="15">Jetha_Rehan_Arcade.py</text>

    <rect x="322" y="126" width="172" height="82" rx="16" fill="#182235" stroke="#FACC15"/>
    <text x="350" y="160" fill="#F8FAFC" font-size="19" font-weight="700">Login page</text>
    <text x="350" y="188" fill="#CBD5E1" font-size="15">Pages/login.py</text>

    <rect x="322" y="286" width="172" height="82" rx="16" fill="#182235" stroke="#F472B6"/>
    <text x="354" y="320" fill="#F8FAFC" font-size="19" font-weight="700">Home page</text>
    <text x="354" y="348" fill="#CBD5E1" font-size="15">Pages/home.py</text>

    <rect x="588" y="80" width="170" height="76" rx="16" fill="#152033" stroke="#A78BFA"/>
    <text x="616" y="114" fill="#F8FAFC" font-size="18" font-weight="700">users.json</text>
    <text x="616" y="138" fill="#CBD5E1" font-size="14">accounts + coins</text>

    <rect x="588" y="205" width="170" height="76" rx="16" fill="#152033" stroke="#22C55E"/>
    <text x="618" y="239" fill="#F8FAFC" font-size="18" font-weight="700">Coin helpers</text>
    <text x="618" y="263" fill="#CBD5E1" font-size="14">Control/coins.py</text>

    <rect x="588" y="330" width="170" height="76" rx="16" fill="#152033" stroke="#FB7185"/>
    <text x="616" y="364" fill="#F8FAFC" font-size="18" font-weight="700">Mini-games</text>
    <text x="616" y="388" fill="#CBD5E1" font-size="14">HighLow + DFM</text>

    <rect x="848" y="152" width="182" height="84" rx="16" fill="#182235" stroke="#F97316"/>
    <text x="880" y="187" fill="#F8FAFC" font-size="18" font-weight="700">PyBoy games</text>
    <text x="880" y="213" fill="#CBD5E1" font-size="14">optional ROMs</text>

    <rect x="848" y="286" width="182" height="84" rx="16" fill="#182235" stroke="#38BDF8"/>
    <text x="882" y="321" fill="#F8FAFC" font-size="18" font-weight="700">Save states</text>
    <text x="882" y="347" fill="#CBD5E1" font-size="14">Saves/ folder</text>
  </g>

  <path d="M242 214C274 202 292 184 322 169" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M242 236C281 254 289 298 322 322" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M494 166C532 151 548 126 588 118" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M494 326C536 306 548 258 588 244" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M494 332C534 351 548 365 588 368" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M758 243C801 232 813 204 848 194" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M940 236V286" stroke="#38BDF8" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
