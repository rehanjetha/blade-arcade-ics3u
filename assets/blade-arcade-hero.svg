<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Blade Arcade project banner</title>
  <desc id="desc">A stylized arcade dashboard showing the Blade Arcade login, coin system, mini-games, and optional emulator section.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.48" stop-color="#243447"/>
      <stop offset="1" stop-color="#2A1B3D"/>
    </linearGradient>
    <linearGradient id="blade" x1="172" y1="67" x2="1012" y2="451" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <path d="M78 380C225 249 349 201 526 233C714 267 811 183 1037 80" stroke="url(#blade)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <path d="M111 411C271 298 428 278 580 309C760 346 898 257 1110 161" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="440" height="344" rx="22" fill="#0F172A" stroke="#334155"/>
    <rect x="96" y="100" width="392" height="62" rx="16" fill="#182235"/>
    <circle cx="124" cy="131" r="12" fill="#F87171"/>
    <circle cx="160" cy="131" r="12" fill="#FACC15"/>
    <circle cx="196" cy="131" r="12" fill="#34D399"/>
    <text x="96" y="222" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">Blade Arcade</text>
    <text x="98" y="266" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="24">ICS3U Python + Tkinter project</text>
    <rect x="98" y="310" width="142" height="46" rx="23" fill="#22D3EE"/>
    <text x="129" y="341" fill="#06202A" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Login</text>
    <rect x="254" y="310" width="140" height="46" rx="23" fill="#FACC15"/>
    <text x="288" y="341" fill="#312300" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Coins</text>
    <rect x="98" y="366" width="248" height="18" rx="9" fill="#334155"/>
    <rect x="98" y="366" width="164" height="18" rx="9" fill="#F472B6"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="570" y="76" width="248" height="160" rx="24" fill="#172033" stroke="#3B82F6" stroke-opacity="0.45"/>
    <text x="600" y="126" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">Free Games</text>
    <text x="600" y="164" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">HighLow Gamble</text>
    <text x="600" y="196" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Duck, Fish, Mosquito</text>
    <circle cx="772" cy="182" r="24" fill="#FACC15"/>
    <text x="760" y="191" fill="#3A2600" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">$</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="76" width="268" height="160" rx="24" fill="#172033" stroke="#F472B6" stroke-opacity="0.45"/>
    <text x="890" y="126" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">Optional Emulator</text>
    <text x="890" y="164" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">PyBoy integration</text>
    <text x="890" y="196" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">User-provided ROMs</text>
    <rect x="1052" y="154" width="38" height="38" rx="8" fill="#F472B6"/>
    <rect x="1064" y="132" width="14" height="82" rx="7" fill="#22D3EE"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="570" y="276" width="558" height="134" rx="24" fill="#0B1220" stroke="#475569"/>
    <text x="604" y="324" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">Local arcade loop</text>
    <text x="604" y="363" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="20">Sign in -> play games -> earn or spend coins -> save progress</text>
    <rect x="604" y="382" width="72" height="10" rx="5" fill="#22D3EE"/>
    <rect x="688" y="382" width="72" height="10" rx="5" fill="#FACC15"/>
    <rect x="772" y="382" width="72" height="10" rx="5" fill="#F472B6"/>
  </g>

  <text x="78" y="470" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">Built by Rehan Jetha</text>
  <text x="972" y="470" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="18">Python 3 / Tkinter</text>
</svg>
